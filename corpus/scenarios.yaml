  # ===== Dimension 2: threat_assessment (Prompt) =====

  - id: "tc-010"
    name: "Threat assessment for Kubernetes multi-tenant PII system"
    target: "threat_assessment"
    type: "prompt"
    prompt_params:
      COMPONENT: "Multi-tenant Kubernetes PII Processing Platform"
      ID_PREFIX: "K8S-PII"
    prompt_template: "prompts/create-threat-catalog.txt"
    expected:
      threats_must_include:
        - "K8S-PII"
        - "ThreatCatalog"
        - "Multi-tenant Kubernetes"
      artifact_type: "ThreatCatalog"
      golden_file: "golden/tc-010-expected.yaml"
    determinism:
      # Phase 1: prompt template is static Go string interpolation — exact match is correct
      phase1: {runs: 20, match_type: "exact", threshold: 1.0}
      # Phase 2: LLM-generated response varies — use Jaccard + GEval with lower threshold
      phase2: {runs: 5, match_type: "jaccard", threshold: 0.8, geval_threshold: 0.7, pass_rate_threshold: 0.8}

