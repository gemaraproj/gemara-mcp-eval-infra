name: "NFR6 — Output Determinism"

# NFR6 compliance gate. Runs on every push and PR to main.
# Exits 1 if the 90% determinism threshold is not met.
# No LLM, no Ollama, no Node.js required.
#
# External inputs:
#   gemara_mcp_image   — the gemara-mcp Docker image to evaluate
#   gemara_schema_ref  — git ref (tag/branch/SHA) of gemaraproj/gemara to use
#                        for corpus validation (default: main)
#
# The upstream pipeline builds and pushes the image then triggers this workflow,
# passing the image tag and the schema ref that matches the build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      gemara_mcp_image:
        description: "gemara-mcp Docker image to evaluate (e.g. ghcr.io/org/gemara-mcp:sha-abc123)"
        required: false
        default: "ghcr.io/gemaraproj/gemara-mcp:latest"
      gemara_schema_ref:
        description: "gemaraproj/gemara git ref for corpus validation (tag, branch, or SHA)"
        required: false
        default: "main"

jobs:
  output-determinism:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      GEMARA_MCP_IMAGE: ${{ github.event.inputs.gemara_mcp_image || 'ghcr.io/gemaraproj/gemara-mcp:latest' }}
      GEMARA_SCHEMA_REF: ${{ github.event.inputs.gemara_schema_ref || 'main' }}
      GEMARA_SCHEMA_PATH: /tmp/gemara
      CONTAINER_RUNTIME: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install -r eval/dfah/requirements.txt
          pip install -r eval/mcp-eval/requirements.txt
          pip install -r eval/deepeval/requirements.txt

      # --- Corpus validation gate ---
      # Validates tc-*-valid-*.yaml fixtures against the gemara CUE schemas.
      # Catches schema drift before the harnesses run, so failures are diagnosed
      # as stale corpus rather than unexplained harness failures.

      - name: Checkout gemara schema (${{ env.GEMARA_SCHEMA_REF }})
        run: |
          git clone --depth 1 --branch ${{ env.GEMARA_SCHEMA_REF }} \
            https://github.com/gemaraproj/gemara ${{ env.GEMARA_SCHEMA_PATH }}
          echo "Schema at: $(git -C ${{ env.GEMARA_SCHEMA_PATH }} log -1 --oneline)"

      - name: Install CUE
        run: |
          # Detect the language version required by the gemara schema and install
          # a CUE CLI release that satisfies it. Falls back to latest release.
          REQUIRED_LANG=$(grep -r 'language:' ${{ env.GEMARA_SCHEMA_PATH }}/cue.mod/module.cue 2>/dev/null \
            | grep -oP 'v\d+\.\d+\.\d+' | head -1 || echo "")
          echo "Schema requires CUE language: ${REQUIRED_LANG:-unknown}"

          LATEST=$(curl -s https://api.github.com/repos/cue-lang/cue/releases/latest | jq -r .tag_name)
          echo "Installing CUE ${LATEST}"
          curl -sSL "https://github.com/cue-lang/cue/releases/download/${LATEST}/cue_${LATEST}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin cue
          cue version

      - name: Validate corpus against schema
        id: corpus-validate
        run: make corpus-validate

      # --- Per-harness steps — all always run and upload independently
      #     so a partial failure still produces usable results.

      - name: Pull gemara-mcp image
        id: pull-image
        run: docker pull ${{ env.GEMARA_MCP_IMAGE }}

      - name: "Harness: dfah"
        if: always() && steps['corpus-validate'].outcome == 'success' && steps['pull-image'].outcome == 'success'
        continue-on-error: true
        id: dfah
        run: make eval-dfah

      - name: Upload dfah results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dfah
          path: results/dfah.json
          if-no-files-found: warn

      - name: "Harness: mcp-eval"
        if: always() && steps['corpus-validate'].outcome == 'success' && steps['pull-image'].outcome == 'success'
        continue-on-error: true
        id: mcp-eval
        run: make eval-mcp-eval

      - name: Upload mcp-eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-eval
          path: results/mcp-eval.json
          if-no-files-found: warn

      - name: "Harness: deepeval"
        if: always() && steps['corpus-validate'].outcome == 'success' && steps['pull-image'].outcome == 'success'
        continue-on-error: true
        id: deepeval
        run: make eval-deepeval

      - name: Upload deepeval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval
          path: results/deepeval.json
          if-no-files-found: warn

      - name: Print harness summary
        if: always()
        run: |
          echo "| Harness        | Outcome |"
          echo "|----------------|---------|"
          echo "| corpus-validate| ${{ steps['corpus-validate'].outcome }} |"
          echo "| pull-image     | ${{ steps['pull-image'].outcome }} |"
          echo "| dfah           | ${{ steps.dfah.outcome }} |"
          echo "| mcp-eval       | ${{ steps['mcp-eval'].outcome }} |"
          echo "| deepeval       | ${{ steps.deepeval.outcome }} |"

      - name: Generate NFR6 report
        if: always()
        continue-on-error: true
        run: make report

      - name: Upload NFR6 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfr6-report
          path: results/nfr6-report.json
          if-no-files-found: warn

      - name: Check NFR6 threshold
        run: |
          python -c "
          import json, sys
          with open('results/nfr6-report.json') as f:
              report = json.load(f)
          verdict = report['nfr6_report']['nfr6_verdict']
          score = report['nfr6_report']['overall_determinism_score']
          print(f'NFR6: {verdict} (score: {score:.1%})')
          for a in report['per_tool_assessments']:
              s = a['determinism_score']
              s_str = f\"{s:.1%}\" if s is not None else 'N/A'
              print(f\"  {a['tool']}: {s_str} ({a['nfr6_contribution'].upper()})\")
          sys.exit(0 if verdict == 'PASS' else 1)
          "
